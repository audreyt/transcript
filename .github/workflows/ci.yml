name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need enough history for `git diff origin/master...HEAD` on PRs.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.7 /usr/local/bin
          actionlint -version

      - name: Lint workflows
        run: actionlint -color .github/workflows/*.yml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test tests/unit

      - name: Validate content (PR)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          echo "Comparing against base SHA: $BASE_SHA"
          bun scripts/validate.ts --changed --base "$BASE_SHA"

      - name: Validate content (push)
        if: github.event_name == 'push'
        run: bun scripts/validate.ts --all
