name: Post-deploy E2E

on:
  # Triggered after the sync+deploy workflow finishes on master.
  workflow_run:
    workflows: ["Sync markdown on push"]
    types: [completed]
    branches: [master]
  # Daily canary — catches archive.tw drift when no commits land for a day.
  schedule:
    - cron: '0 12 * * *'
  # Manual smoke.
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  canary:
    # Skip if the upstream sync workflow itself failed — there's nothing to verify.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe homepage
        run: |
          code=$(curl -fsSL -o /tmp/home.html -w "%{http_code}" https://archive.tw/)
          test "$code" = "200" || { echo "homepage returned $code"; exit 1; }
          grep -q 'id="app"' /tmp/home.html || { echo "homepage HTML missing app root"; exit 1; }

      - name: Probe English canary transcript
        run: |
          url="https://archive.tw/2020-10-07-interview-with-azeem-azhar"
          code=$(curl -fsSL -o /tmp/en.html -w "%{http_code}" "$url")
          test "$code" = "200" || { echo "EN canary returned $code"; exit 1; }
          grep -q '2020-10-07 Interview with Azeem Azhar' /tmp/en.html \
            || { echo "EN canary missing expected h1"; exit 1; }

      - name: Probe Chinese bilingual canary
        run: |
          # Full-width colon is stripped from the slug by sayit-hono.
          url="https://archive.tw/2025-02-27-商周專欄防堵-ai-賓拉登"
          code=$(curl -fsSL -o /tmp/zh.html -w "%{http_code}" "$url")
          test "$code" = "200" || { echo "ZH canary returned $code"; exit 1; }
          grep -q '2025-02-27 商周專欄' /tmp/zh.html \
            || { echo "ZH canary missing expected h1"; exit 1; }

  visual:
    # Non-blocking: this job uploads artifacts; it should not gate deploys.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    needs: canary
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test --reporter=github,html

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 30
          if-no-files-found: warn
