name: One-off reimport EN outrage-to-overlap

# Temporary, manually-dispatched job to unstick the half-synced EN speech
# "2026-05-28 Outrage to Overlap" on archive.tw. The speech was left with
# `base*100+N` sub-section IDs that collide with the global
# speech_content.section_id PRIMARY KEY on every PATCH (HTTP 503). DELETE then
# POST forces a clean re-import: POST allocates fresh sequential IDs from
# MAX(section_id)+1, avoiding the buggy sub-section allocation path entirely.
# Delete this workflow once the speech is healthy.

on:
  workflow_dispatch:

jobs:
  reimport:
    runs-on: ubuntu-latest
    env:
      API_ENDPOINT: https://archive.tw/api/upload_markdown
      AUDREYT_TRANSCRIPT_TOKEN: ${{ secrets.AUDREYT_TRANSCRIPT_TOKEN }}
      BESTIAN_TRANSCRIPT_TOKEN: ${{ secrets.BESTIAN_TRANSCRIPT_TOKEN }}
      EN_FILE: 2026-05-28-Outrage-to-Overlap-Civic-AI-and-6-Pack-of-Care.md
      ZH_FILE: 2026-05-28-從憤怒到交集-仁工智慧與關懷六力.md
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve token
        id: token
        shell: bash
        run: |
          t="${AUDREYT_TRANSCRIPT_TOKEN:-}"
          if [ -z "$t" ]; then t="${BESTIAN_TRANSCRIPT_TOKEN:-}"; fi
          if [ -z "$t" ]; then echo "No transcript token available" >&2; exit 1; fi
          echo "::add-mask::$t"
          echo "value=$t" >> "$GITHUB_OUTPUT"

      - name: Delete stuck EN speech (404 is fine)
        env:
          TOKEN: ${{ steps.token.outputs.value }}
        shell: bash
        run: |
          code=$(curl -sS -o /tmp/del.json -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Repository: audreyt/transcript" \
            "${API_ENDPOINT}?filename=$(jq -rn --arg f "$EN_FILE" '$f|@uri')")
          echo "DELETE -> HTTP ${code}"
          cat /tmp/del.json; echo
          if [ "$code" != "200" ] && [ "$code" != "404" ]; then exit 1; fi

      - name: Re-POST EN speech (fresh sequential IDs)
        env:
          TOKEN: ${{ steps.token.outputs.value }}
        shell: bash
        run: |
          jq -n --arg fn "$EN_FILE" --arg alt "$ZH_FILE" --rawfile md "$EN_FILE" \
            '{filename:$fn, markdown:$md, alternate_filename:$alt}' > /tmp/body.json
          code=$(curl -sS -o /tmp/post.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "X-GitHub-Repository: audreyt/transcript" \
            --data-binary @/tmp/body.json \
            "${API_ENDPOINT}")
          echo "POST -> HTTP ${code}"
          cat /tmp/post.json; echo
          [ "$code" = "200" ] || exit 1
