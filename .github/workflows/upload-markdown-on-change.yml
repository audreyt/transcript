name: Sync markdown on push

on:
  push:
    paths:
      - "*.md"
      - ".alternates"
      - "scripts/sync_markdown.py"
  workflow_dispatch:
    inputs:
      before_sha:
        description: 'Before SHA for catch-up sync after a failed run'
        required: true

# 同一 commit 若重複觸發，只保留一次執行
concurrency:
  group: upload-markdown-sync-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-markdown:
    runs-on: ubuntu-latest
    env:
      API_ENDPOINT: https://archive.tw/api/upload_markdown
      AUDREYT_TRANSCRIPT_TOKEN: ${{ secrets.AUDREYT_TRANSCRIPT_TOKEN }}
      BESTIAN_TRANSCRIPT_TOKEN: ${{ secrets.BESTIAN_TRANSCRIPT_TOKEN }}
    steps:
      - name: Checkout repository
        # Push depth 50 (not 5) so squash-merges and long PR branches don't
        # make `git show before_sha:.alternates` fail silently — that would
        # return None and cause a cascade re-sync of the entire corpus.
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name != 'workflow_dispatch' && 50 || 0 }}

      - name: Resolve token
        id: token
        shell: bash
        run: |
          # Empty-string secrets (cleared or missing in some contexts) are
          # treated the same as unset. Log which identity is in use so that a
          # silent fallback to BESTIAN doesn't get lost in the run log.
          audreyt="${AUDREYT_TRANSCRIPT_TOKEN:-}"
          bestian="${BESTIAN_TRANSCRIPT_TOKEN:-}"
          if [ -n "${audreyt}" ]; then
            echo "Using AUDREYT_TRANSCRIPT_TOKEN" >&2
            echo "value=${audreyt}" >> "${GITHUB_OUTPUT}"
          elif [ -n "${bestian}" ]; then
            echo "::warning::AUDREYT_TRANSCRIPT_TOKEN is empty or unset; falling back to BESTIAN_TRANSCRIPT_TOKEN" >&2
            echo "value=${bestian}" >> "${GITHUB_OUTPUT}"
          else
            echo "Neither AUDREYT_TRANSCRIPT_TOKEN nor BESTIAN_TRANSCRIPT_TOKEN is set (or both are empty)." >&2
            exit 1
          fi

      - name: Sync changed markdown and alternate mappings
        env:
          TOKEN: ${{ steps.token.outputs.value }}
          BEFORE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.before_sha || github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        shell: bash
        run: python3 scripts/sync_markdown.py

  rebuild-search-index:
    needs: sync-markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout transcript (this repo)
        uses: actions/checkout@v4

      - name: Checkout sayit-hono
        uses: actions/checkout@v4
        with:
          repository: audreyt/sayit-hono
          path: sayit-hono

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install sayit-hono dependencies
        working-directory: sayit-hono
        run: npm ci

      - name: Build views and assets
        working-directory: sayit-hono
        run: npm run build:views && npm run build:assets

      - name: Build search index
        working-directory: sayit-hono
        run: npm run build:search -- ${{ github.workspace }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        working-directory: sayit-hono
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
