name: Sync markdown on push

on:
  push:
    paths:
      - "*.md"
      - ".alternates"
      - ".redirects"
      - "scripts/sync_markdown.ts"
  workflow_dispatch:
    inputs:
      before_sha:
        description: 'Before SHA for catch-up sync after a failed run'
        required: true

# 同一 commit 若重複觸發，只保留一次執行
concurrency:
  group: upload-markdown-sync-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-markdown:
    runs-on: ubuntu-latest
    env:
      API_ENDPOINT: https://archive.tw/api/upload_markdown
      API_REDIRECTS_ENDPOINT: https://archive.tw/api/redirects
      AUDREYT_TRANSCRIPT_TOKEN: ${{ secrets.AUDREYT_TRANSCRIPT_TOKEN }}
      BESTIAN_TRANSCRIPT_TOKEN: ${{ secrets.BESTIAN_TRANSCRIPT_TOKEN }}
    steps:
      - name: Checkout repository
        # Push depth 50 (not 5) so squash-merges and long PR branches don't
        # make `git show before_sha:.alternates` fail silently — that would
        # return None and cause a cascade re-sync of the entire corpus.
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name != 'workflow_dispatch' && 50 || 0 }}

      - name: Resolve token
        id: token
        shell: bash
        run: |
          # Empty-string secrets (cleared or missing in some contexts) are
          # treated the same as unset. Log which identity is in use so that a
          # silent fallback to BESTIAN doesn't get lost in the run log.
          audreyt="${AUDREYT_TRANSCRIPT_TOKEN:-}"
          bestian="${BESTIAN_TRANSCRIPT_TOKEN:-}"
          if [ -n "${audreyt}" ]; then
            echo "Using AUDREYT_TRANSCRIPT_TOKEN" >&2
            echo "value=${audreyt}" >> "${GITHUB_OUTPUT}"
          elif [ -n "${bestian}" ]; then
            echo "::warning::AUDREYT_TRANSCRIPT_TOKEN is empty or unset; falling back to BESTIAN_TRANSCRIPT_TOKEN" >&2
            echo "value=${bestian}" >> "${GITHUB_OUTPUT}"
          else
            echo "Neither AUDREYT_TRANSCRIPT_TOKEN nor BESTIAN_TRANSCRIPT_TOKEN is set (or both are empty)." >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync changed markdown and alternate mappings
        env:
          TOKEN: ${{ steps.token.outputs.value }}
          BEFORE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.before_sha || github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        shell: bash
        run: bun scripts/sync_markdown.ts

  rebuild-search-index:
    needs: sync-markdown
    runs-on: ubuntu-latest
    steps:
      # Both repos go under sub-paths so sayit-hono's build:search can resolve
      # ../transcript without an explicit path arg, which lets us run the full
      # `bun run deploy` pipeline (preflight + cache-version + views + assets
      # + search + wrangler deploy + verify-deploy) as a single step.
      - name: Checkout transcript (this repo)
        uses: actions/checkout@v6
        with:
          path: transcript

      - name: Checkout sayit-hono
        uses: actions/checkout@v6
        with:
          repository: bestian/sayit-hono
          ref: main
          path: sayit-hono
          # preflight:deploy reads /version, then runs `git cat-file -e <sha>`
          # and `git merge-base --is-ancestor <sha> HEAD` against the live
          # worker's commit. Default depth 1 wouldn't have the ancestor.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install sayit-hono dependencies
        working-directory: sayit-hono
        run: bun install --frozen-lockfile

      # `bun run deploy` runs preflight:deploy first (refuses to ship a commit
      # older than the live worker, see scripts/preflight-deploy.ts) and then
      # verify:deploy after wrangler, so a silently-stale or silently-failed
      # deploy can't roll archive.tw back. This replaces the old separate
      # build/deploy steps that pointed at the now-defunct audreyt/sayit-hono
      # fork and skipped both guards.
      - name: Deploy to Cloudflare
        working-directory: sayit-hono
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
